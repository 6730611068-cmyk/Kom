<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Dom</title>
</head>

<body>
    <input id="firstname" name="first" value="test">
    <div>
        <h1>สิ่งที่สนใจ</h1>
        <div id="newcontent">

        </div>
    </div>
    <div>
        <input type="checkbox" name="interest" value="หนังสือ">หนังสือ
        <input type="checkbox" name="interest" value="เกม">เกม
        <input type="checkbox" name="interest" value="กีฬา">กีฬา
    </div>
    <div>
        <button onclick='submitinterest()'>สิ่งที่สนใจ</button>
    </div>
    <div>
        <button onclick='buttonClick()'>คลิก</button>
    </div>
    <div>
        <button id="submit_btn" onclick='submitData()'>ส่งข้อมูล</button>
    </div>
    <div onmouseover='overitem()'>
        วางเมาส์
    </div>
    <div id="hellomyname">hello<span style="display: none;">my name</span>
    </div>

    <a id = "thislink" href="https://google.com" target="_blank">google</a>

    <script>
        console.log('Hello');
        let FirstnameDOM = document.getElementById('firstname');

        console.log(FirstnameDOM.value);

        console.log(document.getElementById('firstname').value);
        console.log(document.querySelector('#firstname').value);
        console.log(document.querySelector('input[name="first"]').value);

        let hobby = document.querySelectorAll('input[name=interest]');
        console.log(hobby.length);
        for (let i = 0; i < hobby.length; i++) {
            console.log(hobby[i].value);
        }
        function buttonClick() {
            console.log('คลิกแล้ว')
        };
        const btn = document.getElementById('submit_btn');
        btn.addEventListener('click', submitData);
        function submitData() {
            console.log('ส่งข้อมูลแล้ว')
            btn.setAttribute('disabled','true')
        };
        function overitem() {
            console.log('วางเมาส์')
        }
        const myname = document.getElementById('hellomyname');
        console.log(myname);
        console.log(myname.textContent);
        console.log(myname.innerText);
        console.log(myname.innerHTML);
        let myhtml = '<ul>';
        myhtml += '<li>' + FirstnameDOM.value + '</li>';
        myhtml += '</ul>';
        console.log(document.getElementById('mycontent').innerHTML = myhtml);
        document.getElementById('mycontent').innerHTML = myhtml;
        let setCSS = document.getElementById('hellomyname');
        setCSS.style.backgroundColor = 'blue';

        function submitinterest() {
            let interestdom = document.querySelectorAll('input[name-interest]');
            let contenthtml = '<ui>';
            for (let i = 0; i < interestdom.length; i++) {
                if (interestdom[i].value);
                contenthtml += '<li>' + interestdom[i].value + '<li>';
            }
            contenthtml += '</ul>';
            let contentdom = document.getElementById('newcontent');
            contentdom.innerHTML = contenthtml;
        }
        let thislinkDOM = document.getElementById('thislink');
        console.log(thislinkDOM.getAttribute('href'));
        thislinkDOM.setAttribute('href','https://www.youtube.com');



    </script>
</body>
</html>
